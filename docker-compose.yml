version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - NODE_ENV=production
    depends_on:
      - moodtracker
      - voice

  tars:
    build:
      context: ./TARS
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    depends_on:
      - ollama

  moodtracker:
    build:
      context: ./moodtracker
      dockerfile: Dockerfile
    ports:
      - "5002:5002"

  voice:
    build:
      context: ./Voice
      dockerfile: Dockerfile
    ports:
      - "5000:5000"

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  ollama-setup:
    image: curlimages/curl:latest
    depends_on:
      - ollama
    entrypoint: [ "sh", "-c", "sleep 5 && curl -X POST http://ollama:11434/api/pull -d '{\"name\": \"qwen2.5:0.5b\"}' && curl -X POST http://ollama:11434/api/copy -d '{\"source\": \"qwen2.5:0.5b\", \"destination\": \"llama3.1:8b-instruct\"}'" ]

volumes:
  ollama_data:
